<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Chooser & Münze</title>

<link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
<link rel="shortcut icon" href="favicon/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="RanChos" />
<link rel="manifest" href="favicon/site.webmanifest" />
   
    
<style>
    html, body {
        height: 100%;
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        transition: background 0.3s ease;
    }

    /* --- VIDEOS --- */
    #videoBackground {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 0;
        pointer-events: none;
    }

    #videoBackground video {
        position: absolute;
        width: auto;
        height: 300px;
        object-fit: cover;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }

    /* --- UI Container --- */
    .container {
        position: relative;
        z-index: 10;
        text-align: center;
        width: 100%;
        max-width: 600px;
        padding: 20px;
    }

    h1, h2 {
        color: #fff;
        text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        margin-bottom: 30px;
    }

    h1 { font-size: 2.5rem; font-weight: 300; }
    h2 { font-size: 2rem; font-weight: 300; }

    button {
        padding: 20px 40px;
        font-size: 1.3rem;
        font-weight: 500;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        margin: 15px;
        transition: all 0.3s ease;
        background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
        color: white;
        box-shadow: 0 8px 25px rgba(255, 107, 107, 0.3);
        min-width: 180px;
        position: relative;
        overflow: hidden;
    }

    button:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 35px rgba(255, 107, 107, 0.4);
    }
    button:active { transform: translateY(-1px); }

    /* --- Ergebnis-Text (Random + Münze) --- */
    .name, .coin-result {
        margin-top: 40px;
        font-size: 3rem;
        font-weight: 900;
        letter-spacing: 2px;
        text-transform: uppercase;
        opacity: 0;
        transition: opacity 0.5s ease;
        background: linear-gradient(90deg, #ff0080, #ff8c00, #40e0d0);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: glow 2s linear infinite, gradientShift 5s ease infinite;
        text-shadow: 0 0 20px rgba(255,255,255,0.6);
    }

    .show {
        opacity: 1;
        animation: fadeInScale 0.5s ease, glow 2s linear infinite, gradientShift 5s ease infinite;
    }

    @keyframes fadeInScale {
        0% { opacity: 0; transform: scale(0.7); }
        100% { opacity: 1; transform: scale(1); }
    }

    @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    @keyframes glow {
        0% { text-shadow: 0 0 10px #fff, 0 0 20px #ff0080; }
        50% { text-shadow: 0 0 20px #40e0d0, 0 0 30px #ff8c00; }
        100% { text-shadow: 0 0 10px #fff, 0 0 20px #ff0080; }
    }

    /* --- Name Management --- */
    .name-management {
        margin-top: 30px;
        padding: 15px;
        background: rgba(255,255,255,0.1);
        border-radius: 16px;
        backdrop-filter: blur(6px);
    }

    .name-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin-bottom: 12px;
    }

    .name-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        background: rgba(255,255,255,0.2);
        border-radius: 20px;
        color: #fff;
        font-size: 0.95rem;
        font-weight: 500;
    }

    .name-tag .remove-btn {
        background: none;
        border: none;
        color: rgba(255,255,255,0.7);
        font-size: 1rem;
        cursor: pointer;
        padding: 0 2px;
        min-width: auto;
        margin: 0;
        box-shadow: none;
        line-height: 1;
        border-radius: 50%;
        transition: color 0.2s;
    }

    .name-tag .remove-btn:hover {
        color: #ff6b6b;
        transform: none;
        box-shadow: none;
    }

    .name-add-row {
        display: flex;
        justify-content: center;
        gap: 8px;
    }

    .name-add-row input {
        padding: 8px 14px;
        border: none;
        border-radius: 20px;
        font-size: 1rem;
        outline: none;
        width: 160px;
        background: rgba(255,255,255,0.25);
        color: #fff;
    }

    .name-add-row input::placeholder { color: rgba(255,255,255,0.6); }

    .name-add-row button {
        padding: 8px 18px;
        font-size: 1rem;
        min-width: auto;
        margin: 0;
    }

    /* Responsive */
    @media (max-width: 768px) {
        button { min-width: 250px; }
        h1 { font-size: 2rem; }
        .name, .coin-result { font-size: 2.2rem; }
        .name-add-row button { min-width: auto; }
    }

    /* ---- HACKER CONSOLE ---- */
    #hackerConsole {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 9999;
        background: #0a0a0a;
        color: #00ff41;
        font-family: 'Courier New', Courier, monospace;
        overflow-y: auto;
        animation: hackerFadeIn 0.4s ease;
    }

    @keyframes hackerFadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
    }

    /* scanline overlay */
    #hackerConsole::before {
        content: '';
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        background: repeating-linear-gradient(
            0deg,
            rgba(0, 255, 65, 0.03) 0px,
            rgba(0, 255, 65, 0.03) 1px,
            transparent 1px,
            transparent 3px
        );
        z-index: 10000;
    }

    /* flicker animation on the whole console */
    #hackerConsole {
        animation: hackerFadeIn 0.4s ease, hackerFlicker 4s infinite;
    }

    @keyframes hackerFlicker {
        0%   { opacity: 1; }
        3%   { opacity: 0.85; }
        5%   { opacity: 1; }
        50%  { opacity: 1; }
        52%  { opacity: 0.9; }
        53%  { opacity: 1; }
        80%  { opacity: 1; }
        82%  { opacity: 0.88; }
        84%  { opacity: 1; }
        100% { opacity: 1; }
    }

    .hacker-inner {
        max-width: 600px;
        margin: 0 auto;
        padding: 40px 20px 60px;
        position: relative;
    }

    .hacker-close {
        position: absolute;
        top: 15px; right: 15px;
        background: none;
        border: 1px solid #00ff41;
        color: #00ff41;
        font-size: 1.6rem;
        width: 40px; height: 40px;
        cursor: pointer;
        border-radius: 4px;
        font-family: 'Courier New', Courier, monospace;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        min-width: auto;
        margin: 0;
        box-shadow: 0 0 8px rgba(0,255,65,0.3);
        transition: background 0.2s, box-shadow 0.2s;
    }

    .hacker-close:hover {
        background: rgba(0,255,65,0.15);
        box-shadow: 0 0 16px rgba(0,255,65,0.5);
        transform: none;
    }

    .hacker-title {
        text-align: center;
        font-size: 2.2rem;
        font-weight: bold;
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-bottom: 10px;
        text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41, 0 0 40px #00ff41;
        animation: hackerGlow 2s ease-in-out infinite;
    }

    @keyframes hackerGlow {
        0%   { text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41; }
        50%  { text-shadow: 0 0 20px #00ff41, 0 0 40px #00ff41, 0 0 60px #00ff41; }
        100% { text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41; }
    }

    .hacker-subtitle {
        text-align: center;
        font-size: 0.85rem;
        color: #00cc33;
        margin-bottom: 30px;
        opacity: 0.7;
    }

    .hacker-person {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        margin-bottom: 8px;
        background: rgba(0,255,65,0.05);
        border: 1px solid rgba(0,255,65,0.15);
        border-radius: 4px;
        gap: 12px;
    }

    .hacker-person-name {
        font-size: 1.1rem;
        flex-shrink: 0;
        min-width: 90px;
    }

    .hacker-person-slider {
        flex: 1;
        -webkit-appearance: none;
        appearance: none;
        height: 6px;
        background: rgba(0,255,65,0.2);
        border-radius: 3px;
        outline: none;
    }

    .hacker-person-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px; height: 16px;
        border-radius: 50%;
        background: #00ff41;
        cursor: pointer;
        box-shadow: 0 0 6px #00ff41;
    }

    .hacker-person-slider::-moz-range-thumb {
        width: 16px; height: 16px;
        border-radius: 50%;
        background: #00ff41;
        cursor: pointer;
        border: none;
        box-shadow: 0 0 6px #00ff41;
    }

    .hacker-person-weight {
        font-size: 1rem;
        min-width: 40px;
        text-align: right;
        color: #00ff41;
        font-weight: bold;
    }

    /* --- Wer würde eher --- */
    .wwe-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .wwe-close {
        background: rgba(255,255,255,0.15);
        border: none;
        color: #fff;
        font-size: 1.4rem;
        width: 40px; height: 40px;
        cursor: pointer;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        min-width: auto;
        margin: 0;
        box-shadow: none;
        transition: background 0.2s;
    }

    .wwe-close:hover {
        background: rgba(255,255,255,0.3);
        transform: none;
        box-shadow: none;
    }

    .wwe-persons {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        margin: 20px 0;
        flex-wrap: wrap;
    }

    .wwe-person {
        padding: 14px 28px;
        background: rgba(255,255,255,0.15);
        border-radius: 20px;
        color: #fff;
        font-size: 1.4rem;
        font-weight: 600;
        backdrop-filter: blur(6px);
        text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }

    .wwe-vs {
        font-size: 1.8rem;
        font-weight: 900;
        color: #ff6b6b;
        text-shadow: 0 0 10px rgba(255,107,107,0.5);
    }

    .wwe-question-box {
        margin: 25px 0;
        padding: 20px;
        background: rgba(255,255,255,0.1);
        border-radius: 16px;
        backdrop-filter: blur(6px);
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .wwe-question-text {
        color: #fff;
        font-size: 1.2rem;
        font-weight: 500;
        line-height: 1.5;
    }

    .wwe-counter {
        color: rgba(255,255,255,0.7);
        font-size: 0.9rem;
        margin-top: 10px;
    }

    /* Swap animation */
    @keyframes wweSwapIn {
        0% { opacity: 0; transform: scale(0.3) rotate(-10deg); }
        50% { transform: scale(1.15) rotate(3deg); }
        100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .wwe-swap-animation {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 9000;
        background: rgba(0,0,0,0.8);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        animation: hackerFadeIn 0.3s ease;
    }

    .wwe-swap-text {
        font-size: 2.5rem;
        font-weight: 900;
        color: #fff;
        text-align: center;
        animation: wweSwapIn 0.8s ease;
        background: linear-gradient(90deg, #ff0080, #ff8c00, #40e0d0);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: wweSwapIn 0.8s ease, gradientShift 2s ease infinite;
    }

    .wwe-swap-emoji {
        font-size: 4rem;
        animation: wweSwapIn 0.6s ease;
        margin-bottom: 20px;
    }

    /* --- Abendplanung --- */
    .ap-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .ap-close {
        background: rgba(255,255,255,0.15);
        border: none;
        color: #fff;
        font-size: 1.4rem;
        width: 40px; height: 40px;
        cursor: pointer;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        min-width: auto;
        margin: 0;
        box-shadow: none;
        transition: background 0.2s;
    }

    .ap-close:hover {
        background: rgba(255,255,255,0.3);
        transform: none;
        box-shadow: none;
    }

    .ap-result-box {
        margin: 30px 0;
        padding: 25px;
        background: rgba(255,255,255,0.1);
        border-radius: 16px;
        backdrop-filter: blur(6px);
    }

    .ap-bar {
        font-size: 2.8rem;
        font-weight: 900;
        letter-spacing: 2px;
        text-transform: uppercase;
        background: linear-gradient(90deg, #ff0080, #ff8c00, #40e0d0);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: gradientShift 5s ease infinite;
        margin-bottom: 15px;
    }

    .ap-motto {
        font-size: 1.4rem;
        font-weight: 500;
        color: rgba(255,255,255,0.85);
        line-height: 1.4;
    }

    .ap-slot {
        font-size: 2rem;
        font-weight: 700;
        color: #fff;
        text-align: center;
        margin: 10px 0;
        min-height: 2.5em;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .ap-slot-motto {
        font-size: 1.3rem;
        font-weight: 500;
        color: rgba(255,255,255,0.7);
    }

    @keyframes apSlotSpin {
        0% { opacity: 0; transform: translateY(-20px); }
        20% { opacity: 1; transform: translateY(0); }
        80% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(20px); }
    }

    .ap-slot-spinning {
        animation: apSlotSpin 0.15s ease-in-out;
    }

    /* --- Imposter Game --- */
    .imposter-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .imposter-close {
        background: rgba(255,255,255,0.15);
        border: none;
        color: #fff;
        font-size: 1.4rem;
        width: 40px; height: 40px;
        cursor: pointer;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        min-width: auto;
        margin: 0;
        box-shadow: none;
        transition: background 0.2s;
    }

    .imposter-close:hover {
        background: rgba(255,255,255,0.3);
        transform: none;
        box-shadow: none;
    }

    .imposter-count-section {
        margin: 20px 0;
        padding: 15px;
        background: rgba(255,255,255,0.1);
        border-radius: 16px;
        backdrop-filter: blur(6px);
    }

    .imposter-count-label {
        color: #fff;
        font-size: 1.1rem;
        margin-bottom: 10px;
        font-weight: 500;
    }

    .imposter-count-row {
        display: flex;
        justify-content: center;
        gap: 8px;
    }

    .imposter-count-btn {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        font-size: 1.2rem;
        font-weight: 700;
        padding: 0;
        min-width: auto;
        margin: 0;
        background: rgba(255,255,255,0.15);
        color: #fff;
        border: 2px solid transparent;
        transition: all 0.2s;
    }

    .imposter-count-btn.active {
        background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
        border-color: #fff;
        box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
    }

    .imposter-count-btn:hover {
        transform: none;
        background: rgba(255,255,255,0.25);
    }

    .imposter-count-btn.active:hover {
        background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
    }

    .imposter-player-section {
        margin: 20px 0;
    }

    .imposter-player-name {
        font-size: 2.5rem;
        font-weight: 900;
        color: #fff;
        text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        margin: 30px 0;
        animation: fadeInScale 0.5s ease;
    }

    .imposter-role-box {
        margin: 25px 0;
        padding: 25px;
        background: rgba(255,255,255,0.1);
        border-radius: 16px;
        backdrop-filter: blur(6px);
        min-height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .imposter-role-text {
        color: #fff;
        font-size: 1.5rem;
        font-weight: 700;
        line-height: 1.5;
    }

    .imposter-role-text.imposter {
        color: #ff6b6b;
        text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
    }

    .imposter-result-name {
        font-size: 3rem;
        font-weight: 900;
        letter-spacing: 2px;
        text-transform: uppercase;
        background: linear-gradient(90deg, #ff0080, #ff8c00, #40e0d0);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: fadeInScale 0.5s ease, glow 2s linear infinite, gradientShift 5s ease infinite;
        margin: 20px 0 5px;
    }

    .imposter-result-msg {
        color: rgba(255,255,255,0.8);
        font-size: 1.3rem;
        margin-bottom: 30px;
    }

    /* --- Imposter Auflösung --- */
    .imposter-auflosung-btn {
        padding: 16px 36px;
        font-size: 1.2rem;
        font-weight: 600;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        margin: 20px auto;
        background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
        color: white;
        box-shadow: 0 8px 25px rgba(255, 107, 107, 0.3);
        min-width: 180px;
        transition: all 0.3s ease;
    }

    .imposter-auflosung-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 35px rgba(255, 107, 107, 0.4);
    }

    .imposter-auflosung-list {
        margin: 20px 0;
        padding: 15px;
        background: rgba(255,255,255,0.1);
        border-radius: 16px;
        backdrop-filter: blur(6px);
    }

    .imposter-auflosung-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px;
        margin: 6px 0;
        border-radius: 12px;
        background: rgba(255,255,255,0.08);
        color: #fff;
        font-size: 1.1rem;
        font-weight: 500;
    }

    .imposter-auflosung-item.is-imposter {
        background: rgba(255, 107, 107, 0.25);
        border: 1px solid rgba(255, 107, 107, 0.5);
    }

    .imposter-auflosung-item .player-name {
        flex: 1;
    }

    .imposter-auflosung-item .player-role {
        font-weight: 700;
        margin-left: 12px;
    }

    .imposter-auflosung-item.is-imposter .player-role {
        color: #ff6b6b;
        text-shadow: 0 0 8px rgba(255, 107, 107, 0.5);
    }

    .imposter-auflosung-word {
        color: #fff;
        font-size: 1.3rem;
        font-weight: 700;
        margin: 15px 0 10px;
        text-align: center;
    }

    .imposter-auflosung-word span {
        background: linear-gradient(90deg, #ff0080, #ff8c00, #40e0d0);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: gradientShift 5s ease infinite;
    }

    /* --- Würdest du eher --- */
    #wdeGame {
        padding: 0 !important;
        max-width: 100vw !important;
        width: 100vw !important;
        height: 100vh;
        position: fixed;
        top: 0; left: 0;
        z-index: 100;
        border-radius: 0 !important;
        display: flex;
        flex-direction: column;
    }

    .wde-close {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 110;
        background: rgba(0,0,0,0.35);
        border: none;
        color: #fff;
        font-size: 1.5rem;
        width: 44px; height: 44px;
        cursor: pointer;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        min-width: auto;
        margin: 0;
        box-shadow: none;
        transition: background 0.2s;
    }

    .wde-close:hover {
        background: rgba(0,0,0,0.55);
        transform: none;
        box-shadow: none;
    }

    .wde-split {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        position: relative;
    }

    .wde-half {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        padding: 32px 24px;
        transition: filter 0.2s;
        user-select: none;
        position: relative;
    }

    .wde-half:active {
        filter: brightness(0.85);
    }

    .wde-top {
        background: #2563eb;
    }

    .wde-bottom {
        background: #dc2626;
    }

    .wde-option-text {
        color: #fff;
        font-size: 1.5rem;
        font-weight: 700;
        text-align: center;
        max-width: 85%;
        line-height: 1.4;
    }

    .wde-percent {
        color: rgba(255,255,255,0.95);
        font-size: 3rem;
        font-weight: 800;
        margin-top: 16px;
        display: none;
    }

    .wde-percent.show {
        display: block;
    }

    .wde-divider {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 5;
        background: #fff;
        color: #1a1a2e;
        font-size: 1.4rem;
        font-weight: 900;
        padding: 10px 28px;
        border-radius: 30px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        letter-spacing: 2px;
    }

    /* --- Groups Feature --- */
    .groups-section {
        margin-bottom: 12px;
    }

    .groups-list {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding: 8px 4px;
        justify-content: flex-start;
    }

    .group-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        padding: 10px 14px;
        background: rgba(255,255,255,0.12);
        border-radius: 14px;
        min-width: 70px;
        transition: all 0.2s ease;
        border: 2px solid transparent;
        position: relative;
    }

    .group-item:hover {
        background: rgba(255,255,255,0.22);
        transform: translateY(-2px);
    }

    .group-item .group-icon {
        font-size: 1.6rem;
        margin-bottom: 4px;
    }

    .group-item .group-name {
        color: #fff;
        font-size: 0.8rem;
        font-weight: 500;
        text-align: center;
        word-break: break-word;
        max-width: 80px;
    }

    .group-item .group-delete {
        position: absolute;
        top: -6px;
        right: -6px;
        background: rgba(255, 107, 107, 0.9);
        border: none;
        color: #fff;
        font-size: 0.7rem;
        width: 20px;
        height: 20px;
        cursor: pointer;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        min-width: auto;
        margin: 0;
        box-shadow: none;
        opacity: 0;
        transition: opacity 0.2s;
    }

    .group-item:hover .group-delete {
        opacity: 1;
    }

    .group-item .group-delete:hover {
        background: #ff4444;
        transform: none;
        box-shadow: none;
    }

    .group-create-btn {
        padding: 8px 18px;
        font-size: 1rem;
        min-width: auto;
        margin: 8px 0 0;
        background: linear-gradient(45deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        transition: all 0.3s ease;
    }

    .group-create-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }
</style>
</head>
<body>
    <!-- Video-Hintergrund -->
    <div id="videoBackground"></div>

    <!-- UI -->
    <div class="container" id="app">
        <div id="startScreen" class="game-container">
            <h1>🎲 Wähle ein Spiel 🎲</h1>
            <div class="choice-buttons">
                <button id="coinGameBtn">🪙 Münze werfen</button>

        <div id="coinGame" class="game-container" style="display:none;">

        <div id="minigamesScreen" class="game-container" style="display:none;">
            <h2>🎮 Minigames</h2>
            <button id="wweGameBtn">🤔 Wer würde eher</button>

        <div id="wweGame" class="game-container" style="display:none;">
            <div class="wwe-header">

            </div>
            <div class="wwe-persons" id="wwePersons">

                <span class="wwe-vs">VS</span>

            </div>
            <div class="wwe-question-box" id="wweQuestionBox">
                <span class="wwe-question-text" id="wweQuestionText">Drücke den Knopf um eine Frage aufzudecken!</span>
            </div>
            <button id="wweRevealBtn">🔍 Frage aufdecken</button>

        <!-- Imposter Setup -->
        <div id="imposterSetup" class="game-container" style="display:none;">
            <div class="imposter-header">
                <!-- spacer to keep close button right-aligned via justify-content:space-between -->
                <div></div>

                <div class="imposter-count-label">Anzahl Imposter:</div>
                <div class="imposter-count-row" id="imposterCountRow"></div>
            </div>
            <div class="name-management">
                <div class="groups-section" id="imposterGroupsSection"></div>
                <div class="name-tags" id="imposterNameTags"></div>
                <div class="name-add-row">
                    <input type="text" id="imposterNameInput" placeholder="Neuer Name…">
                    <button id="imposterAddNameBtn">+ Hinzufügen</button>
                </div>
                <button class="group-create-btn" id="imposterCreateGroupBtn">👥 Gruppe erstellen</button>

            <button id="imposterStartBtn">🎮 Spiel starten</button>
        </div>

        <!-- Imposter Game (Role Reveal) -->
        <div id="imposterGame" class="game-container" style="display:none;">
            <div class="imposter-header" id="imposterGameHeader">
                <!-- spacer to keep close button right-aligned via justify-content:space-between -->
                <div></div>
                <button class="imposter-close" id="imposterGameCloseBtn">✕</button>

            <div id="imposterRoleReveal">

                <div class="imposter-result-name" id="imposterStarterName"></div>

                <div class="imposter-auflosung-word" id="imposterAuflosungWord"></div>
                <div class="imposter-auflosung-list" id="imposterAuflosungList"></div>
                <button id="imposterAuflosungCloseBtn">Schließen</button>

        <div id="wdeGame" class="game-container" style="display:none;">
            <button class="wde-close" id="wdeCloseBtn">✕</button>
            <div class="wde-split" id="wdeSplit">
                <div class="wde-half wde-top" id="wdeTop">
                    <span class="wde-option-text" id="wdeOptionA"></span>
                    <span class="wde-percent" id="wdePercentA"></span>
                </div>
                <div class="wde-divider">ODER</div>
                <div class="wde-half wde-bottom" id="wdeBottom">
                    <span class="wde-option-text" id="wdeOptionB"></span>
                    <span class="wde-percent" id="wdePercentB"></span>
                </div>
            </div>

        <div id="abendplanungGame" class="game-container" style="display:none;">
            <div class="ap-header">
                <h2 style="margin-bottom:0;">🍻 Abendplanung</h2>
                <button class="ap-close" id="apCloseBtn">✕</button>
            </div>
            <div id="apInitial">
                <button id="apRandomizeBtn">🎲 Randomize</button>
            </div>
            <div id="apResult" style="display:none;">
                <div class="ap-result-box">
                    <div class="ap-bar" id="apBarName"></div>
                    <div class="ap-motto" id="apMottoName"></div>
                </div>
                <button id="apRerollBtn">🎲 Neu würfeln</button>
            </div>
            <div id="apAnimation" style="display:none;">
                <div class="ap-slot" id="apSlotBar"></div>
                <div class="ap-slot ap-slot-motto" id="apSlotMotto"></div>

    <!-- Hacker Console -->
    <div id="hackerConsole">
        <div class="hacker-inner">
            <button class="hacker-close" id="hackerCloseBtn">✕</button>
            <div class="hacker-title">Hacker-Konsole</div>
            <div class="hacker-subtitle">// Wahrscheinlichkeiten manipulieren</div>
            <div id="hackerPersonList"></div>
        </div>
    </div>

<script>
    /* ------------------- VIDEO BACKGROUND ------------------- */
    const videoFiles = [
        "media/subway.mp4",
        "media/chaya_julius.mp4",
        "media/chaya2.mp4",
        "media/chaya1.mp4",
        "media/brainrot_italia.mp4"
    ];

    const videoContainer = document.getElementById("videoBackground");
    const videos = [];

    videoFiles.forEach(src => {
        const video = document.createElement("video");
        video.src = src;
        video.autoplay = true;
        video.loop = true;
        video.volume = 1.0;
        video.playsInline = true;

        // Sound erlauben erst nach User-Interaktion
        video.muted = true;
        videoContainer.appendChild(video);

        videos.push({
            el: video,
            x: Math.random() * (window.innerWidth - 220),
            y: Math.random() * (window.innerHeight - 140),
            dx: (Math.random() < 0.5 ? -1 : 1) * (1 + Math.random() * 2),
            dy: (Math.random() < 0.5 ? -1 : 1) * (1 + Math.random() * 2),
            w: 220,
            h: 140
        });
    });

    // Bewegung
    function animateVideos() {
        videos.forEach(v => {
            v.x += v.dx;
            v.y += v.dy;

            if (v.x <= 0 || v.x + v.w >= window.innerWidth) v.dx *= -1;
            if (v.y <= 0 || v.y + v.h >= window.innerHeight) v.dy *= -1;

            v.el.style.transform = `translate(${v.x}px, ${v.y}px)`;
        });
        requestAnimationFrame(animateVideos);
    }
    animateVideos();

    // Sound freischalten nach erstem Klick
    document.body.addEventListener("click", () => {
        videos.forEach(v => v.el.muted = false);
    }, { once: true });

    /* ------------------- SPIEL-LOGIK ------------------- */
    const startScreen = document.getElementById('startScreen');
    const coinGame = document.getElementById('coinGame');
    const randomGame = document.getElementById('randomGame');
    const minigamesScreen = document.getElementById('minigamesScreen');
    const wweGame = document.getElementById('wweGame');
    const wdeGame = document.getElementById('wdeGame');
    const abendplanungGame = document.getElementById('abendplanungGame');

    document.getElementById('coinGameBtn').onclick = () => {
        startScreen.style.display = 'none';
        coinGame.style.display = 'block';
    };

    document.getElementById('randomGameBtn').onclick = () => {
        startScreen.style.display = 'none';
        randomGame.style.display = 'block';
        renderGroups();
    };

    document.getElementById('minigamesBtn').onclick = () => {
        startScreen.style.display = 'none';
        minigamesScreen.style.display = 'block';
    };

    document.getElementById('backFromCoin').onclick = () => {
        coinGame.style.display = 'none';
        startScreen.style.display = 'block';
        document.getElementById('coinResult').classList.remove('show');
    };

    document.getElementById('backFromRandom').onclick = () => {
        randomGame.style.display = 'none';
        startScreen.style.display = 'block';
        document.getElementById('nameDisplay').classList.remove('show');
    };

    document.getElementById('backFromMinigames').onclick = () => {
        minigamesScreen.style.display = 'none';
        startScreen.style.display = 'block';
    };

    document.getElementById('wweGameBtn').onclick = () => {
        minigamesScreen.style.display = 'none';
        wweGame.style.display = 'block';
        startWweRound();
    };

    document.getElementById('wweCloseBtn').onclick = () => {
        wweGame.style.display = 'none';
        minigamesScreen.style.display = 'block';
        resetWwe();
    };

    document.getElementById('backFromWwe').onclick = () => {
        wweGame.style.display = 'none';
        startScreen.style.display = 'block';
        resetWwe();
    };

    document.getElementById('wdeGameBtn').onclick = () => {
        minigamesScreen.style.display = 'none';
        wdeGame.style.display = 'block';
        startWde();
    };

    document.getElementById('wdeCloseBtn').onclick = () => {
        wdeGame.style.display = 'none';
        minigamesScreen.style.display = 'block';
        stopWde();
    };

    /* ------------------- ABENDPLANUNG ------------------- */
    let apBars = [];
    let apMottos = [];

    fetch('abendplanung.json')
        .then(res => res.json())
        .then(data => {
            apBars = data.bars || [];
            apMottos = data.mottos || [];
        })
        .catch(() => {
            apBars = [];
            apMottos = [];
        });

    document.getElementById('abendplanungBtn').onclick = () => {
        minigamesScreen.style.display = 'none';
        abendplanungGame.style.display = 'block';
        document.getElementById('apInitial').style.display = 'block';
        document.getElementById('apResult').style.display = 'none';
        document.getElementById('apAnimation').style.display = 'none';
    };

    document.getElementById('apCloseBtn').onclick = () => {
        abendplanungGame.style.display = 'none';
        minigamesScreen.style.display = 'block';
    };

    function apRandomize() {
        if (apBars.length === 0 || apMottos.length === 0) return;

        document.getElementById('apInitial').style.display = 'none';
        document.getElementById('apResult').style.display = 'none';
        document.getElementById('apAnimation').style.display = 'block';

        const slotBar = document.getElementById('apSlotBar');
        const slotMotto = document.getElementById('apSlotMotto');
        const totalSteps = 15;
        let step = 0;

        const interval = setInterval(() => {
            slotBar.textContent = apBars[Math.floor(Math.random() * apBars.length)];
            slotMotto.textContent = apMottos[Math.floor(Math.random() * apMottos.length)];
            slotBar.classList.remove('ap-slot-spinning');
            slotMotto.classList.remove('ap-slot-spinning');
            void slotBar.offsetWidth;
            slotBar.classList.add('ap-slot-spinning');
            slotMotto.classList.add('ap-slot-spinning');
            step++;

            if (step >= totalSteps) {
                clearInterval(interval);
                const finalBar = apBars[Math.floor(Math.random() * apBars.length)];
                const finalMotto = apMottos[Math.floor(Math.random() * apMottos.length)];
                document.getElementById('apBarName').textContent = finalBar;
                document.getElementById('apMottoName').textContent = finalMotto;
                document.getElementById('apAnimation').style.display = 'none';
                document.getElementById('apResult').style.display = 'block';
            }
        }, 120);
    }

    document.getElementById('apRandomizeBtn').onclick = apRandomize;
    document.getElementById('apRerollBtn').onclick = apRandomize;

    const defaultNames = ["Finn", "Vincent", "Julius", "Henri", "Tilman"];
    let names;
    try {
        names = JSON.parse(localStorage.getItem('names')) || defaultNames.slice();
    } catch (e) {
        names = defaultNames.slice();
    }

    function saveNames() {
        localStorage.setItem('names', JSON.stringify(names));
    }

    function renderNameTags() {
        const container = document.getElementById('nameTags');
        container.innerHTML = '';
        names.forEach((name, index) => {
            const tag = document.createElement('span');
            tag.className = 'name-tag';
            tag.textContent = name;
            const btn = document.createElement('button');
            btn.className = 'remove-btn';
            btn.textContent = '✕';
            btn.addEventListener('click', () => {
                names.splice(index, 1);
                saveNames();
                renderNameTags();
            });
            tag.appendChild(btn);
            container.appendChild(tag);
        });
    }

    document.getElementById('addNameBtn').addEventListener('click', () => {
        const input = document.getElementById('nameInput');
        const val = input.value.trim();
        if (val) {
            names.push(val);
            input.value = '';
            saveNames();
            renderNameTags();
        }
    });

    document.getElementById('nameInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('addNameBtn').click();
    });

    renderNameTags();

    document.getElementById('magicButton').addEventListener('click', () => {
        const btn = document.getElementById('magicButton');
        const nameDisplay = document.getElementById('nameDisplay');
        if (names.length === 0) return;
        btn.classList.add('pulsing');
        nameDisplay.classList.remove('show');
        setTimeout(() => {
            btn.classList.remove('pulsing');
            // Weighted random selection
            let totalWeight = 0;
            names.forEach(name => { totalWeight += getWeight(name); });
            let rand = Math.random() * totalWeight;
            let randomName = names[0];
            for (const name of names) {
                rand -= getWeight(name);
                if (rand <= 0) { randomName = name; break; }
            }
            nameDisplay.textContent = randomName;
            nameDisplay.classList.add('show');
        }, 2000);
    });

    document.getElementById('flipCoinBtn').addEventListener('click', () => {
        const btn = document.getElementById('flipCoinBtn');
        const coinResult = document.getElementById('coinResult');
        btn.classList.add('pulsing');
        coinResult.classList.remove('show');
        setTimeout(() => {
            btn.classList.remove('pulsing');
            const result = Math.random() < 0.5 ? 'Kopf' : 'Zahl';
            coinResult.textContent = result;
            coinResult.classList.add('show');
        }, 2000);
    });

    /* ------------------- WER WÜRDE EHER ------------------- */
    let wweQuestions = [];
    let wweQuestionCount = 0;
    let wweUsedQuestions = [];
    let wwePerson1 = '';
    let wwePerson2 = '';

    // Load questions from JSON
    fetch('fragen_wer_wuerde.json')
        .then(res => res.json())
        .then(data => { wweQuestions = data.questions || []; })
        .catch(() => { wweQuestions = []; });

    function pickTwoPersons() {
        if (names.length < 2) return;
        const idx1 = Math.floor(Math.random() * names.length);
        let idx2 = Math.floor(Math.random() * (names.length - 1));
        if (idx2 >= idx1) idx2++;
        wwePerson1 = names[idx1];
        wwePerson2 = names[idx2];
        document.getElementById('wwePerson1').textContent = wwePerson1;
        document.getElementById('wwePerson2').textContent = wwePerson2;
    }

    function startWweRound() {
        wweQuestionCount = 0;
        wweUsedQuestions = [];
        pickTwoPersons();
        document.getElementById('wweQuestionText').textContent = 'Drücke den Knopf um eine Frage aufzudecken!';
        document.getElementById('wweCounter').textContent = '';
    }

    function resetWwe() {
        wweQuestionCount = 0;
        wweUsedQuestions = [];
        document.getElementById('wweQuestionText').textContent = 'Drücke den Knopf um eine Frage aufzudecken!';
        document.getElementById('wweCounter').textContent = '';
    }

    document.getElementById('wweRevealBtn').addEventListener('click', () => {
        if (names.length < 2) {
            document.getElementById('wweQuestionText').textContent = 'Mindestens 2 Personen werden benötigt!';
            return;
        }
        if (wweQuestions.length === 0) {
            document.getElementById('wweQuestionText').textContent = 'Keine Fragen geladen!';
            return;
        }

        wweQuestionCount++;

        if (wweQuestionCount > 5) {
            // Show swap animation, then pick new persons
            wweQuestionCount = 1;
            showSwapAnimation(() => {
                pickTwoPersons();
                revealQuestion();
            });
            return;
        }

        revealQuestion();
    });

    function revealQuestion() {
        let available = wweQuestions.filter((_, i) => !wweUsedQuestions.includes(i));
        if (available.length === 0) {
            wweUsedQuestions = [];
            available = wweQuestions;
        }
        const randomIndex = Math.floor(Math.random() * available.length);
        const originalIndex = wweQuestions.indexOf(available[randomIndex]);
        wweUsedQuestions.push(originalIndex);
        const questionText = document.getElementById('wweQuestionText');
        questionText.textContent = available[randomIndex];
        document.getElementById('wweCounter').textContent = 'Frage ' + wweQuestionCount + ' / 5';
    }

    function showSwapAnimation(callback) {
        const overlay = document.createElement('div');
        overlay.className = 'wwe-swap-animation';
        overlay.innerHTML = '<div class="wwe-swap-emoji">🔄</div><div class="wwe-swap-text">Neue Runde!<br>Personen werden getauscht!</div>';
        document.body.appendChild(overlay);

        setTimeout(() => {
            overlay.remove();
            if (callback) callback();
        }, 2500);
    }

    /* ------------------- IMPOSTER GAME ------------------- */
    let imposterWords = [];
    let imposterCount = 1;
    let imposterCurrentIndex = 0;
    let imposterRoles = []; // { name, isImposter }
    let imposterWord = '';

    // Load words from JSON
    fetch('woerter_imposter.json')
        .then(res => res.json())
        .then(data => { imposterWords = data.woerter || []; })
        .catch(() => { imposterWords = []; });

    const imposterSetup = document.getElementById('imposterSetup');
    const imposterGame = document.getElementById('imposterGame');

    // Navigation
    document.getElementById('imposterGameBtn').onclick = () => {
        minigamesScreen.style.display = 'none';
        imposterSetup.style.display = 'block';
        renderImposterCountButtons();
        renderImposterNameTags();
        renderGroups();
    };

    document.getElementById('imposterSetupCloseBtn').onclick = () => {
        imposterSetup.style.display = 'none';
        minigamesScreen.style.display = 'block';
    };

    document.getElementById('imposterGameCloseBtn').onclick = () => {
        imposterGame.style.display = 'none';
        imposterSetup.style.display = 'block';
        renderImposterNameTags();
        renderGroups();
    };

    // Imposter count buttons (1-5)
    function renderImposterCountButtons() {
        const row = document.getElementById('imposterCountRow');
        row.innerHTML = '';
        for (let i = 1; i <= 5; i++) {
            const btn = document.createElement('button');
            btn.className = 'imposter-count-btn' + (i === imposterCount ? ' active' : '');
            btn.textContent = i;
            btn.addEventListener('click', () => {
                imposterCount = i;
                renderImposterCountButtons();
            });
            row.appendChild(btn);
        }
    }

    // Player list for Imposter setup (shared with global names)
    function renderImposterNameTags() {
        const container = document.getElementById('imposterNameTags');
        container.innerHTML = '';
        names.forEach((name, index) => {
            const tag = document.createElement('span');
            tag.className = 'name-tag';
            tag.textContent = name;
            const btn = document.createElement('button');
            btn.className = 'remove-btn';
            btn.textContent = '✕';
            btn.addEventListener('click', () => {
                names.splice(index, 1);
                saveNames();
                renderNameTags();
                renderImposterNameTags();
            });
            tag.appendChild(btn);
            container.appendChild(tag);
        });
    }

    document.getElementById('imposterAddNameBtn').addEventListener('click', () => {
        const input = document.getElementById('imposterNameInput');
        const val = input.value.trim();
        if (val) {
            names.push(val);
            input.value = '';
            saveNames();
            renderNameTags();
            renderImposterNameTags();
        }
    });

    document.getElementById('imposterNameInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') document.getElementById('imposterAddNameBtn').click();
    });

    // Fisher-Yates shuffle
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Start game
    document.getElementById('imposterStartBtn').addEventListener('click', () => {
        if (names.length < 2) {
            alert('Mindestens 2 Spieler werden benötigt!');
            return;
        }
        if (imposterCount >= names.length) {
            alert('Es müssen mehr Spieler als Imposter vorhanden sein!');
            return;
        }
        if (imposterWords.length === 0) {
            alert('Keine Wörter geladen!');
            return;
        }

        // Pick random word
        imposterWord = imposterWords[Math.floor(Math.random() * imposterWords.length)];

        // Assign roles randomly using Fisher-Yates shuffle
        const shuffled = shuffleArray(names.slice());
        imposterRoles = shuffled.map((name, i) => ({
            name: name,
            isImposter: i < imposterCount
        }));
        // Shuffle again to randomize display order
        shuffleArray(imposterRoles);

        imposterCurrentIndex = 0;

        imposterSetup.style.display = 'none';
        imposterGame.style.display = 'block';
        document.getElementById('imposterGameHeader').style.display = 'flex';
        document.getElementById('imposterAuflosung').style.display = 'none';
        showImposterPlayer();
    });

    function showImposterPlayer() {
        document.getElementById('imposterRoleReveal').style.display = 'block';
        document.getElementById('imposterResult').style.display = 'none';

        const player = imposterRoles[imposterCurrentIndex];
        document.getElementById('imposterCurrentPlayer').textContent = player.name;
        document.getElementById('imposterRevealBtn').style.display = 'inline-block';
        document.getElementById('imposterRoleBox').style.display = 'none';
        document.getElementById('imposterNextBtn').style.display = 'none';
    }

    document.getElementById('imposterRevealBtn').addEventListener('click', () => {
        const player = imposterRoles[imposterCurrentIndex];
        const roleText = document.getElementById('imposterRoleText');

        if (player.isImposter) {
            roleText.textContent = 'Du bist der Imposter';
            roleText.className = 'imposter-role-text imposter';
        } else {
            roleText.textContent = imposterWord;
            roleText.className = 'imposter-role-text';
        }

        document.getElementById('imposterRevealBtn').style.display = 'none';
        document.getElementById('imposterRoleBox').style.display = 'flex';
        document.getElementById('imposterNextBtn').style.display = 'inline-block';
    });

    document.getElementById('imposterNextBtn').addEventListener('click', () => {
        imposterCurrentIndex++;
        if (imposterCurrentIndex < imposterRoles.length) {
            showImposterPlayer();
        } else {
            // All players done - show who starts
            const starterIndex = Math.floor(Math.random() * imposterRoles.length);
            const starter = imposterRoles[starterIndex].name;

            document.getElementById('imposterRoleReveal').style.display = 'none';
            document.getElementById('imposterResult').style.display = 'block';
            document.getElementById('imposterAuflosung').style.display = 'none';
            document.getElementById('imposterStarterName').textContent = starter;
            // Hide close button at end, user must use Auflösung
            document.getElementById('imposterGameHeader').style.display = 'none';
        }
    });

    // Auflösung button
    document.getElementById('imposterAuflosungBtn').addEventListener('click', () => {
        document.getElementById('imposterResult').style.display = 'none';
        document.getElementById('imposterAuflosung').style.display = 'block';

        // Show the word
        document.getElementById('imposterAuflosungWord').innerHTML = 'Das Wort war: <span>' + imposterWord + '</span>';

        // Build player list
        const list = document.getElementById('imposterAuflosungList');
        list.innerHTML = '';
        imposterRoles.forEach(player => {
            const item = document.createElement('div');
            item.className = 'imposter-auflosung-item' + (player.isImposter ? ' is-imposter' : '');

            const nameSpan = document.createElement('span');
            nameSpan.className = 'player-name';
            nameSpan.textContent = player.name;

            const roleSpan = document.createElement('span');
            roleSpan.className = 'player-role';
            roleSpan.textContent = player.isImposter ? '🕵️ Imposter' : '✅ Kein Imposter';

            item.appendChild(nameSpan);
            item.appendChild(roleSpan);
            list.appendChild(item);
        });
    });

    // Auflösung close button -> back to imposter setup
    document.getElementById('imposterAuflosungCloseBtn').addEventListener('click', () => {
        imposterGame.style.display = 'none';
        imposterSetup.style.display = 'block';
        document.getElementById('imposterGameHeader').style.display = 'flex';
        document.getElementById('imposterAuflosung').style.display = 'none';
        document.getElementById('imposterResult').style.display = 'none';
        renderImposterNameTags();
        renderGroups();
    });

    /* ------------------- WÜRDEST DU EHER ------------------- */
    let wdeQuestions = [];
    let wdeUsedQuestions = [];
    let wdeTimer = null;
    let wdeClickable = true;

    fetch('wuerdestdueher.json')
        .then(res => res.json())
        .then(data => { wdeQuestions = data.questions || []; })
        .catch(() => { wdeQuestions = []; });

    function pickWdeQuestion() {
        if (wdeQuestions.length === 0) return null;
        if (wdeUsedQuestions.length >= wdeQuestions.length) {
            wdeUsedQuestions = [];
        }
        const available = wdeQuestions.filter(q => !wdeUsedQuestions.includes(q.id));
        const q = available[Math.floor(Math.random() * available.length)];
        wdeUsedQuestions.push(q.id);
        return q;
    }

    function showWdeQuestion() {
        const q = pickWdeQuestion();
        if (!q) return;
        document.getElementById('wdeOptionA').textContent = q.option_a;
        document.getElementById('wdeOptionB').textContent = q.option_b;
        const pA = document.getElementById('wdePercentA');
        const pB = document.getElementById('wdePercentB');
        pA.classList.remove('show');
        pB.classList.remove('show');
        pA.textContent = '';
        pB.textContent = '';
        wdeClickable = true;
    }

    function handleWdeClick() {
        if (!wdeClickable) return;
        wdeClickable = false;
        const pctA = Math.floor(Math.random() * 81) + 10;
        const pctB = 100 - pctA;
        const pA = document.getElementById('wdePercentA');
        const pB = document.getElementById('wdePercentB');
        pA.textContent = pctA + '%';
        pB.textContent = pctB + '%';
        pA.classList.add('show');
        pB.classList.add('show');
        wdeTimer = setTimeout(() => {
            showWdeQuestion();
        }, 1000);
    }

    function startWde() {
        stopWde();
        wdeUsedQuestions = [];
        showWdeQuestion();
        document.getElementById('wdeTop').addEventListener('click', handleWdeClick);
        document.getElementById('wdeBottom').addEventListener('click', handleWdeClick);
    }

    function stopWde() {
        if (wdeTimer) { clearTimeout(wdeTimer); wdeTimer = null; }
        document.getElementById('wdeTop').removeEventListener('click', handleWdeClick);
        document.getElementById('wdeBottom').removeEventListener('click', handleWdeClick);
    }

    /* ------------------- GROUPS FEATURE ------------------- */
    let savedGroups;
    try {
        savedGroups = JSON.parse(localStorage.getItem('savedGroups')) || [];
    } catch (e) {
        console.error('Failed to load groups:', e);
        savedGroups = [];
    }

    function saveGroups() {
        localStorage.setItem('savedGroups', JSON.stringify(savedGroups));
    }

    function createGroup() {
        if (names.length === 0) {
            alert('Füge zuerst Spieler hinzu!');
            return;
        }
        const groupName = prompt('Gruppenname eingeben:');
        if (groupName && groupName.trim()) {
            savedGroups.push({
                name: groupName.trim(),
                players: names.slice()
            });
            saveGroups();
            renderGroups();
        }
    }

    function loadGroup(index) {
        const group = savedGroups[index];
        if (group) {
            names = group.players.slice();
            saveNames();
            renderNameTags();
            renderImposterNameTags();
            renderGroups();
        }
    }

    function deleteGroup(index) {
        savedGroups.splice(index, 1);
        saveGroups();
        renderGroups();
    }

    function renderGroups() {
        const containers = [
            document.getElementById('randomGroupsSection'),
            document.getElementById('imposterGroupsSection')
        ];

        containers.forEach(container => {
            if (!container) return;
            container.innerHTML = '';

            if (savedGroups.length === 0) return;

            const list = document.createElement('div');
            list.className = 'groups-list';

            savedGroups.forEach((group, index) => {
                const item = document.createElement('div');
                item.className = 'group-item';
                item.addEventListener('click', (e) => {
                    if (e.target.classList.contains('group-delete')) return;
                    loadGroup(index);
                });

                const icon = document.createElement('div');
                icon.className = 'group-icon';
                icon.textContent = '👥';

                const name = document.createElement('div');
                name.className = 'group-name';
                name.textContent = group.name;

                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'group-delete';
                deleteBtn.textContent = '✕';
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteGroup(index);
                });

                item.appendChild(deleteBtn);
                item.appendChild(icon);
                item.appendChild(name);
                list.appendChild(item);
            });

            container.appendChild(list);
        });
    }

    document.getElementById('randomCreateGroupBtn').addEventListener('click', createGroup);
    document.getElementById('imposterCreateGroupBtn').addEventListener('click', createGroup);

    // Initial render of groups
    renderGroups();

    /* ------------------- HACKER CONSOLE ------------------- */

    // Weight storage
    let nameWeights;
    try {
        nameWeights = JSON.parse(localStorage.getItem('nameWeights')) || {};
    } catch (e) {
        nameWeights = {};
    }

    function saveWeights() {
        localStorage.setItem('nameWeights', JSON.stringify(nameWeights));
    }

    function getWeight(name) {
        return name in nameWeights ? nameWeights[name] : 1;
    }

    // Long-press detection on "Münze werfen" button (start screen)
    let longPressTimer = null;
    let longPressFired = false;
    const coinGameBtn = document.getElementById('coinGameBtn');

    function startLongPress(e) {
        longPressFired = false;
        longPressTimer = setTimeout(() => {
            longPressFired = true;
            longPressTimer = null;
            openHackerConsole();
        }, 3000);
    }

    function endLongPress(e) {
        if (longPressFired) {
            e.preventDefault();
            e.stopImmediatePropagation();
            longPressFired = false;
            return;
        }
        clearTimeout(longPressTimer);
        longPressTimer = null;
    }

    coinGameBtn.addEventListener('mousedown', startLongPress);
    coinGameBtn.addEventListener('touchstart', startLongPress);
    coinGameBtn.addEventListener('mouseup', endLongPress);
    coinGameBtn.addEventListener('mouseleave', () => {
        if (longPressTimer) {
            clearTimeout(longPressTimer);
            longPressTimer = null;
        }
    });
    coinGameBtn.addEventListener('touchend', endLongPress);
    coinGameBtn.addEventListener('touchcancel', () => {
        if (longPressTimer) {
            clearTimeout(longPressTimer);
            longPressTimer = null;
        }
    });

    // Prevent default click when long press fired
    coinGameBtn.addEventListener('click', (e) => {
        if (longPressFired) {
            e.preventDefault();
            e.stopImmediatePropagation();
            longPressFired = false;
        }
    }, true);

    // Hacker Console open/close
    function openHackerConsole() {
        document.getElementById('hackerConsole').style.display = 'block';
        renderHackerPersonList();
    }

    function closeHackerConsole() {
        document.getElementById('hackerConsole').style.display = 'none';
    }

    document.getElementById('hackerCloseBtn').addEventListener('click', closeHackerConsole);

    function renderHackerPersonList() {
        const container = document.getElementById('hackerPersonList');
        container.innerHTML = '';
        names.forEach(name => {
            const row = document.createElement('div');
            row.className = 'hacker-person';

            const nameEl = document.createElement('span');
            nameEl.className = 'hacker-person-name';
            nameEl.textContent = '> ' + name;

            const slider = document.createElement('input');
            slider.type = 'range';
            slider.className = 'hacker-person-slider';
            slider.min = 0;
            slider.max = 10;
            slider.value = getWeight(name);

            const weightLabel = document.createElement('span');
            weightLabel.className = 'hacker-person-weight';
            weightLabel.textContent = getWeight(name) + 'x';

            slider.addEventListener('input', () => {
                const val = parseInt(slider.value, 10);
                nameWeights[name] = val;
                weightLabel.textContent = val + 'x';
            });

            slider.addEventListener('change', () => {
                saveWeights();
            });

            row.appendChild(nameEl);
            row.appendChild(slider);
            row.appendChild(weightLabel);
            container.appendChild(row);
        });
    }

</script>
</body>
</html>
